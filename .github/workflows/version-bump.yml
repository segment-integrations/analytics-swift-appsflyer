name: Create Version Bump PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump to (e.g., 1.3.1). Leave empty to auto-calculate from conventional commits.'
        required: false
        type: string

jobs:
  create-version-bump-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: true

      - name: Determine version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            # Use provided version
            NEW_VERSION="$INPUT_VERSION"
            echo "Using provided version: $NEW_VERSION"
          else
            # Calculate version from conventional commits
            devbox run -- npx semantic-release --dry-run > /tmp/semrel.log 2>&1 || true

            # Extract version from semantic-release output
            NEW_VERSION=$(grep -oP "Published release \K[0-9]+\.[0-9]+\.[0-9]+" /tmp/semrel.log || echo "")

            if [ -z "$NEW_VERSION" ]; then
              # Fallback: if no version found, check if there are releasable commits
              if grep -q "no release" /tmp/semrel.log; then
                echo "::error::No releasable commits found. Use fix:/feat:/BREAKING CHANGE: commit format."
                exit 1
              fi
              # Get current version and bump patch
              CURRENT_VERSION=$(grep -oP 'internal let __destination_version = "\K[^"]+' Sources/SegmentAppsFlyer/Version.swift)
              echo "Could not calculate version, current is $CURRENT_VERSION"
              exit 1
            fi
            echo "Calculated version from commits: $NEW_VERSION"
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update Version.swift
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/internal let __destination_version = \".*\"/internal let __destination_version = \"$VERSION\"/" Sources/SegmentAppsFlyer/Version.swift

          echo "Updated to version $VERSION:"
          grep "__destination_version" Sources/SegmentAppsFlyer/Version.swift

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" $LAST_TAG..HEAD | grep -v "^- Version " | head -20)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD~10..HEAD | head -20)
          fi

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH_NAME="release/v$VERSION"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch and commit
          git checkout -b "$BRANCH_NAME"
          git add Sources/SegmentAppsFlyer/Version.swift
          git commit -m "chore(release): version $VERSION"
          git push origin "$BRANCH_NAME"

          # Create PR
          gh pr create \
            --title "chore(release): version $VERSION" \
            --body "$(cat <<'EOF'
          ## Version $VERSION

          This PR bumps the version to $VERSION.

          ### Changes
          ${{ steps.changelog.outputs.changelog }}

          ---

          **Note:** When this PR is merged, a GitHub release will be automatically created.
          EOF
          )" \
            --base main \
            --head "$BRANCH_NAME"
